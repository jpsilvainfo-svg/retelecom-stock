name: Backup diario automatico

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger StockTel backup
        env:
          BACKUP_URL: https://retelecom-stock.vercel.app/api/backup
          BACKUP_SECRET: ${{ secrets.BACKUP_SECRET }}
        shell: bash
        run: |
          set -euo pipefail

          CURL_ARGS=(-fsS -X POST "$BACKUP_URL")
          if [ -n "${BACKUP_SECRET:-}" ]; then
            CURL_ARGS+=(-H "x-backup-key: $BACKUP_SECRET")
          fi

          echo "Solicitando backup StockTel..."
          curl "${CURL_ARGS[@]}"
          echo ""
          echo "Backup solicitado com sucesso."
