name: Deploy - Build + Supabase Migrate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  notify-start:
    name: Telegram Deploy Start
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy started
        env:
          DEPLOY_NOTIFY_URL: https://retelecom-stock.vercel.app/api/deploy-notify
          DEPLOY_NOTIFY_SECRET: ${{ secrets.DEPLOY_NOTIFY_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
          AUTHOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(node -e '
            const payload = {
              phase: "start",
              commit: process.env.COMMIT,
              author: process.env.AUTHOR,
              branch: process.env.BRANCH,
              run_url: process.env.RUN_URL
            };
            process.stdout.write(JSON.stringify(payload));
          ')
          ARGS=(-fsS -X POST "$DEPLOY_NOTIFY_URL" -H "Content-Type: application/json" -d "$BODY")
          if [ -n "${DEPLOY_NOTIFY_SECRET:-}" ]; then
            ARGS+=(-H "x-deploy-key: $DEPLOY_NOTIFY_SECRET")
          fi
          curl --retry 3 --retry-delay 10 --retry-all-errors "${ARGS[@]}"

  build:
    name: Build Vite
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}

  migrate:
    name: Supabase Migrations
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          supabase link --project-ref "${SUPABASE_PROJECT_ID}"
          supabase db push --password "${SUPABASE_DB_PASSWORD}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  notify-result:
    name: Telegram Deploy Result
    runs-on: ubuntu-latest
    needs: [build, migrate]
    if: always()
    steps:
      - name: Notify deploy result
        env:
          DEPLOY_NOTIFY_URL: https://retelecom-stock.vercel.app/api/deploy-notify
          DEPLOY_NOTIFY_SECRET: ${{ secrets.DEPLOY_NOTIFY_SECRET }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT: ${{ github.sha }}
          AUTHOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          BUILD_STATUS: ${{ needs.build.result }}
          SUPABASE_STATUS: ${{ needs.migrate.result }}
        shell: bash
        run: |
          set -euo pipefail
          BODY=$(node -e '
            const payload = {
              phase: "result",
              commit: process.env.COMMIT,
              author: process.env.AUTHOR,
              branch: process.env.BRANCH,
              run_url: process.env.RUN_URL,
              build_status: process.env.BUILD_STATUS,
              supabase_status: process.env.SUPABASE_STATUS
            };
            process.stdout.write(JSON.stringify(payload));
          ')
          ARGS=(-fsS -X POST "$DEPLOY_NOTIFY_URL" -H "Content-Type: application/json" -d "$BODY")
          if [ -n "${DEPLOY_NOTIFY_SECRET:-}" ]; then
            ARGS+=(-H "x-deploy-key: $DEPLOY_NOTIFY_SECRET")
          fi
          curl --retry 6 --retry-delay 20 --retry-all-errors "${ARGS[@]}"
