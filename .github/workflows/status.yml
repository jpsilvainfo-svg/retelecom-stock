name: Status Telegram 10min

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - name: Send StockTel status
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SUPA_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          TELEGRAM_EXTRA_2: ${{ secrets.TELEGRAM_EXTRA_2 }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_TOKEN:-}" ] || [ -z "${SUPA_URL:-}" ] || [ -z "${SUPA_KEY:-}" ]; then
            echo "Missing TELEGRAM_TOKEN, VITE_SUPABASE_URL or VITE_SUPABASE_KEY secrets."
            exit 1
          fi

          fetch_key() {
            local key="$1"
            curl -fsS "$SUPA_URL/rest/v1/re_data?select=value&key=eq.$key" \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY"
          }

          USERS=$(fetch_key "re_users" | python3 -c "import json,sys; d=json.load(sys.stdin); v=d[0].get('value', []) if d else []; print(len(v) if isinstance(v, list) else 0)")

          STOCK=$(fetch_key "re_stock" | python3 -c "import json,sys; d=json.load(sys.stdin); v=d[0].get('value', []) if d else []; crit=[x for x in v if isinstance(x,dict) and x.get('min',0)>0 and x.get('qty',0)<=x.get('min',0)*0.6]; total=sum(x.get('qty',0) for x in v if isinstance(x,dict)); print(f'{len(v)} itens | {total} unidades | {len(crit)} criticos')")

          OS=$(fetch_key "re_os" | python3 -c "import json,sys; d=json.load(sys.stdin); v=d[0].get('value', []) if d else []; print(len(v) if isinstance(v, list) else 0)")

          RET=$(fetch_key "re_returns" | python3 -c "import json,sys; d=json.load(sys.stdin); v=d[0].get('value', []) if d else []; pend=[x for x in v if isinstance(x,dict) and x.get('status')=='pending']; print(len(pend))")

          NOW=$(TZ="America/Sao_Paulo" date "+%d/%m/%Y %H:%M")

          MSG="StockTel - Status $NOW

Sistema Online: https://retelecom-stock.vercel.app

Usuarios: $USERS
Estoque: $STOCK
OS registradas: $OS
Devolucoes pendentes: $RET

Proximo status automatico em 10 minutos"

          CHAT_IDS=("-1003823794117" "236353850" "7858844640")
          if [ -n "${TELEGRAM_EXTRA_2:-}" ]; then
            CHAT_IDS+=("$TELEGRAM_EXTRA_2")
          fi

          for CHAT_ID in "${CHAT_IDS[@]}"; do
            curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=$CHAT_ID" \
              --data-urlencode "text=$MSG" \
              > /dev/null
            echo "Status sent to $CHAT_ID"
          done
