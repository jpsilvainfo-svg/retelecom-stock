name: Monitor StockTel 30min

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Ping StockTel services
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST "https://retelecom-stock.vercel.app/api/monitor"
          echo ""
