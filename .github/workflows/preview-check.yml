name: Preview quality check

on:
  pull_request:
  push:
    branches-ignore:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
